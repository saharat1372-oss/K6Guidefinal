<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เข้าสู่ระบบ | K6 Guide</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:linear-gradient(135deg,#fff1eb,#ace0f9);display:flex;align-items:center;justify-content:center;min-height:100vh;">

<div class="card p-4" style="max-width:400px;width:100%;">
<h3 class="text-center mb-4">เข้าสู่ระบบ</h3>

<input type="text" id="username" class="form-control mb-3" placeholder="Username">
<input type="password" id="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-danger btn-block" onclick="login()">เข้าสู่ระบบ</button>

<p class="text-center mt-3">
ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
</p>

<div id="errorMsg" class="text-danger text-center mt-2"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAruIfPAa_g0rD6iJsYbOC4HSjRpjkDJ5s",
authDomain:"programgroup-804c9.firebaseapp.com",
projectId:"programgroup-804c9",
storageBucket:"programgroup-804c9.firebasestorage.app",
messagingSenderId:"406167474531",
appId:"1:406167474531:web:4acc534aff4b5f00720356"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){

const username = document.getElementById("username").value.trim().toLowerCase();
const password = document.getElementById("password").value.trim();
const errorMsg = document.getElementById("errorMsg");

errorMsg.innerText="";

if(!username || !password){
errorMsg.innerText="กรุณากรอกข้อมูล";
return;
}

/* หา email จาก username */
const q = query(collection(db,"users"),where("username","==",username));
const snap = await getDocs(q);

if(snap.empty){
errorMsg.innerText="ไม่พบ Username";
return;
}

const userData = snap.docs[0].data();
const email = userData.email;

/* login จริง */
try{

await signInWithEmailAndPassword(auth,email,password);

/* redirect ตาม role */
if(userData.role === "admin"){
window.location.href="admin.html";
}else{
window.location.href="index.html";
}

}catch(error){
errorMsg.innerText="รหัสผ่านไม่ถูกต้อง";
}

};

</script>
</body>
</html>
